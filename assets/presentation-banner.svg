<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#e8b04a"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="btn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b04a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8b04a" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#bg)" rx="12"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="960" height="2" fill="url(#gold-line)" rx="1"/>

  <!-- Constellation dots -->
  <circle cx="80"  cy="45"  r="1.2" fill="#e8b04a" opacity="0.25"/>
  <circle cx="145" cy="80"  r="0.8" fill="#4ecdc4" opacity="0.18"/>
  <circle cx="50"  cy="120" r="1.0" fill="#e8b04a" opacity="0.15"/>
  <circle cx="200" cy="35"  r="0.7" fill="#4ecdc4" opacity="0.22"/>
  <circle cx="820" cy="50"  r="1.1" fill="#e8b04a" opacity="0.2"/>
  <circle cx="880" cy="90"  r="0.9" fill="#4ecdc4" opacity="0.15"/>
  <circle cx="910" cy="40"  r="0.7" fill="#e8b04a" opacity="0.18"/>
  <circle cx="760" cy="30"  r="1.0" fill="#4ecdc4" opacity="0.12"/>
  <circle cx="700" cy="280" r="0.8" fill="#e8b04a" opacity="0.15"/>
  <circle cx="130" cy="260" r="1.1" fill="#4ecdc4" opacity="0.12"/>
  <circle cx="860" cy="270" r="0.9" fill="#e8b04a" opacity="0.2"/>
  <circle cx="300" cy="290" r="0.7" fill="#4ecdc4" opacity="0.15"/>

  <!-- Constellation lines -->
  <line x1="80" y1="45" x2="145" y2="80" stroke="#e8b04a" stroke-width="0.4" opacity="0.08"/>
  <line x1="145" y1="80" x2="200" y2="35" stroke="#4ecdc4" stroke-width="0.4" opacity="0.06"/>
  <line x1="820" y1="50" x2="880" y2="90" stroke="#e8b04a" stroke-width="0.4" opacity="0.08"/>
  <line x1="880" y1="90" x2="910" y2="40" stroke="#4ecdc4" stroke-width="0.4" opacity="0.06"/>

  <!-- Label -->
  <text x="480" y="68" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="3" fill="#c4943e" opacity="0.7">ALPHALAB-USTC</text>

  <!-- Title -->
  <text x="480" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#e2e0dc">
    <tspan fill="#e8b04a">Auto</tspan>Wiki
  </text>

  <!-- Subtitle -->
  <text x="480" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#8a8780">
    Your LLM Compiles a Knowledge Base. You Just Read It.
  </text>

  <!-- Flow: Drop → Compile → Browse -->
  <g transform="translate(480, 210)" text-anchor="middle">
    <!-- Node 1 -->
    <rect x="-195" y="-24" width="100" height="48" rx="8" fill="#111827" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="-145" y="-2" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#e8b04a">1</text>
    <text x="-145" y="16" font-family="monospace" font-size="10" fill="#8a8780" letter-spacing="0.5">Drop</text>

    <!-- Arrow 1 -->
    <text x="-80" y="6" font-size="16" fill="#5a5855">→</text>

    <!-- Node 2 -->
    <rect x="-50" y="-24" width="100" height="48" rx="8" fill="#111827" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="0" y="-2" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#e8b04a">2</text>
    <text x="0" y="16" font-family="monospace" font-size="10" fill="#8a8780" letter-spacing="0.5">Compile</text>

    <!-- Arrow 2 -->
    <text x="65" y="6" font-size="16" fill="#5a5855">→</text>

    <!-- Node 3 -->
    <rect x="95" y="-24" width="100" height="48" rx="8" fill="#111827" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="145" y="-2" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#e8b04a">3</text>
    <text x="145" y="16" font-family="monospace" font-size="10" fill="#8a8780" letter-spacing="0.5">Browse</text>
  </g>

  <!-- CTA Button -->
  <rect x="365" y="262" width="230" height="38" rx="19" fill="url(#btn-bg)" stroke="#e8b04a" stroke-opacity="0.35" stroke-width="1"/>
  <text x="400" y="286" font-family="monospace" font-size="18" fill="#e8b04a" opacity="0.9">&#9654;</text>
  <text x="420" y="286" font-family="monospace" font-size="13" letter-spacing="0.8" fill="#e8b04a" opacity="0.85">View Presentation</text>

  <!-- Bottom gold line -->
  <rect x="0" y="318" width="960" height="2" fill="url(#gold-line)" rx="1"/>
</svg>
